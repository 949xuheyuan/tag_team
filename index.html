<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tagteam</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-title">tagteam</div>
      <div class="app-subtitle">本地测试版 UI</div>
      <div class="app-actions">
        <button id="btn-new-game" type="button">新开一局</button>
        <button id="btn-toggle-decks" type="button">显示牌库</button>
        <button id="btn-open-log" type="button">对局日志</button>
        <button id="btn-open-rules" type="button">查看规则文本</button>
      </div>
    </header>

    <main class="layout">
      <section class="left">
        <div class="phase-row">
          <div class="phase-label">阶段</div>
          <div id="phase" class="phase-value">加载中</div>
          <div class="spacer"></div>
          <button id="btn-next-battle" type="button" disabled>翻牌并结算</button>
          <button id="btn-enter-construction" type="button" disabled>进入构筑</button>
          <button id="btn-compare" type="button" disabled>对照开始</button>
          <button id="btn-confirm-end" type="button" disabled>确认结束</button>
        </div>

        <section id="battle-reveal" class="battle-reveal"></section>

        <div class="players">
          <div class="player" id="player-p1">
            <div class="player-header">
              <div class="player-name">P1</div>
              <div class="player-meta">
                <span id="p1-battle-count">战斗牌库: -</span>
                <span id="p1-construct-count">构筑牌库: -</span>
                <span id="p1-resolved-count">已结算: -</span>
              </div>
            </div>
            <div id="p1-fighters" class="fighters"></div>
            <div id="p1-decks" class="decks hidden"></div>
          </div>

          <div class="player" id="player-p2">
            <div class="player-header">
              <div class="player-name">P2</div>
              <div class="player-meta">
                <span id="p2-battle-count">战斗牌库: -</span>
                <span id="p2-construct-count">构筑牌库: -</span>
                <span id="p2-resolved-count">已结算: -</span>
              </div>
            </div>
            <div id="p2-fighters" class="fighters"></div>
            <div id="p2-decks" class="decks hidden"></div>
          </div>
        </div>

        <section class="construction-panel" id="construction-panel"></section>
      </section>
    </main>

    <dialog id="log-dialog" class="dialog">
      <form method="dialog" class="dialog-body">
        <div class="dialog-header">
          <div class="dialog-title">对局日志</div>
          <button id="btn-clear-log" type="button">清空</button>
          <button type="submit">关闭</button>
        </div>
        <pre id="log" class="dialog-pre"></pre>
      </form>
    </dialog>

    <dialog id="rules-dialog" class="dialog">
      <form method="dialog" class="dialog-body">
        <div class="dialog-header">
          <div class="dialog-title">规则 / 数据文本</div>
          <button type="submit">关闭</button>
        </div>
        <div class="dialog-tabs">
          <button type="button" data-tab="rules">规则.txt</button>
          <button type="button" data-tab="fighters">战士库.txt</button>
          <button type="button" data-tab="cards">卡牌词条.txt</button>
          <button type="button" data-tab="settlement">结算过程与示例.txt</button>
        </div>
        <pre id="rules-text" class="dialog-pre"></pre>
      </form>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
